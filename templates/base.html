<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}ACC Build Dashboard{% endblock %}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
    }

    /* Sidebar */
    .sidebar {
      width: 240px;
      background: #1a1a2e;
      color: #fff;
      padding: 24px 0;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .sidebar-brand {
      padding: 0 24px 24px;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      margin-bottom: 16px;
    }

    .sidebar-brand h2 {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .sidebar-brand span {
      font-size: 12px;
      color: #7b8794;
      display: block;
      margin-top: 4px;
    }

    .sidebar-nav { list-style: none; flex: 1; }

    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      color: #a0aec0;
      text-decoration: none;
      font-size: 14px;
      transition: all 0.2s;
    }

    .sidebar-nav a:hover,
    .sidebar-nav a.active {
      background: rgba(255,255,255,0.08);
      color: #fff;
    }

    .sidebar-nav .icon {
      width: 20px;
      text-align: center;
      font-size: 16px;
    }

    .sidebar-footer {
      padding: 16px 24px;
      border-top: 1px solid rgba(255,255,255,0.1);
      font-size: 12px;
      color: #7b8794;
    }

    /* Main content */
    .main {
      margin-left: 240px;
      flex: 1;
      min-height: 100vh;
    }

    .topbar {
      background: #fff;
      padding: 16px 32px;
      border-bottom: 1px solid #e2e8f0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .topbar h1 {
      font-size: 20px;
      font-weight: 600;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .user-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      background: #f7fafc;
      border-radius: 8px;
      font-size: 13px;
      color: #4a5568;
    }

    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #4299e1;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 600;
    }

    .content {
      padding: 32px;
    }

    /* Cards */
    .card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e2e8f0;
      padding: 24px;
      margin-bottom: 24px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .card-header h3 {
      font-size: 16px;
      font-weight: 600;
    }

    .card-count {
      background: #edf2f7;
      color: #4a5568;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 13px;
      font-weight: 500;
    }

    /* Project grid */
    .project-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    .project-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 24px;
      text-decoration: none;
      color: inherit;
      transition: all 0.2s;
      display: block;
    }

    .project-card:hover {
      border-color: #4299e1;
      box-shadow: 0 4px 12px rgba(66, 153, 225, 0.15);
      transform: translateY(-2px);
    }

    .project-card h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 8px;
    }

    .project-card .meta {
      font-size: 12px;
      color: #a0aec0;
      margin-bottom: 16px;
      word-break: break-all;
    }

    .project-card .stats {
      display: flex;
      gap: 16px;
      font-size: 13px;
      color: #718096;
    }

    /* Status badge */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }

    .badge-active   { background: #c6f6d5; color: #22543d; }
    .badge-inactive { background: #fed7d7; color: #9b2c2c; }
    .badge-open     { background: #bee3f8; color: #2a4365; }
    .badge-closed   { background: #e2e8f0; color: #4a5568; }
    .badge-draft    { background: #fefcbf; color: #744210; }
    .badge-answered { background: #c6f6d5; color: #22543d; }
    .badge-void     { background: #fed7d7; color: #9b2c2c; }
    .badge-submitted { background: #c4b5fd; color: #4c1d95; }

    /* Tables */
    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      padding: 12px 16px;
      font-size: 12px;
      font-weight: 600;
      color: #a0aec0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      border-bottom: 2px solid #edf2f7;
    }

    td {
      padding: 14px 16px;
      font-size: 14px;
      border-bottom: 1px solid #f7fafc;
    }

    tr:hover td { background: #f7fafc; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: #a0aec0;
    }

    .empty-state .icon { font-size: 48px; margin-bottom: 16px; }
    .empty-state h4 { font-size: 16px; color: #718096; margin-bottom: 8px; }
    .empty-state p { font-size: 14px; }

    /* Breadcrumb */
    .breadcrumb {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #a0aec0;
      margin-bottom: 24px;
    }

    .breadcrumb a {
      color: #4299e1;
      text-decoration: none;
    }

    .breadcrumb a:hover { text-decoration: underline; }

    /* Summary row */
    .summary-row {
      display: flex;
      gap: 20px;
      margin-bottom: 24px;
    }

    .summary-item {
      flex: 1;
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 20px 24px;
    }

    .summary-item .label {
      font-size: 12px;
      color: #a0aec0;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .summary-item .value {
      font-size: 28px;
      font-weight: 700;
    }

    /* Button */
    .btn {
      display: inline-block;
      padding: 8px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #4299e1;
      color: #fff;
    }

    .btn-primary:hover { background: #3182ce; }
  </style>
</head>
<body>
  {% block body %}{% endblock %}
</body>
</html>
