{% extends "base.html" %}
{% block title %}Sign In - ACC Build Dashboard{% endblock %}

{% block body %}
<div style="display:flex; align-items:center; justify-content:center; min-height:100vh; background:#1a1a2e;">
  <div style="text-align:center; background:#fff; padding:48px 56px; border-radius:16px; box-shadow:0 20px 60px rgba(0,0,0,0.3);">
    <div style="width:64px; height:64px; background:#4299e1; border-radius:16px; margin:0 auto 24px; display:flex; align-items:center; justify-content:center;">
      <span style="color:#fff; font-size:28px; font-weight:700;">A</span>
    </div>
    <h1 style="font-size:24px; font-weight:700; margin-bottom:8px;">ACC Build Dashboard</h1>
    <p style="color:#718096; font-size:14px; margin-bottom:32px;">Sign in with your Autodesk account to continue</p>
    <a href="/api/auth/login" class="btn btn-primary" style="padding:12px 40px; font-size:16px; border-radius:10px;">
      Sign in with Autodesk
    </a>
  </div>
</div>
{% endblock %}
